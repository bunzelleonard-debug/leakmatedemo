<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeakMate – Application</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#daebf8;--navy:#1B3A4B;--teal:#26e1c8;--teal-dark:#12b09c;
  --teal-light:#e8fdfb;--teal-border:#a0ede5;
  --surf:#fff;--surf2:#f0f8ff;--bdr:rgba(38,225,200,.15);--bdr2:rgba(0,0,0,.07);
  --tx:#1a2e3b;--txs:#3a5568;--txm:#6b8fa8;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  --amber:#EF9F27;--amber-bg:#faeeda;--amber-bdr:#FAC775;--amber-tx:#854F0B;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-bdr:#F09595;--red-tx:#A32D2D;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}

body{
  font-family:var(--font);
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  background:var(--navy);
  padding:18px 48px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:14px}
.brand-logo{width:38px;height:38px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 2px 12px rgba(38,225,200,.35)}
.brand-name{font-size:22px;font-weight:600;color:#fff;letter-spacing:-.4px}
.brand-name span{color:var(--teal)}
.header-title{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px}
.header-sub{font-size:13px;color:var(--teal);font-style:italic;margin-top:2px}

/* ── MAIN LAYOUT ── */
.layout{
  flex:1;display:flex;align-items:stretch;
  padding:28px 48px 24px;gap:40px;
  min-height:0;
}

/* ── LEFT: tour steps ── */
.tour-panel{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;gap:0;
  justify-content:center;
}
.step{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;
  border-radius:12px;
  cursor:pointer;
  transition:background .15s,box-shadow .15s;
  position:relative;
}
.step::before{
  content:'';position:absolute;left:28px;top:52px;bottom:-14px;width:2px;
  background:rgba(38,225,200,.25);
  display:block;
}
.step:last-child::before{display:none}
.step.active{background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.step-num{
  width:30px;height:30px;border-radius:50%;
  background:rgba(38,225,200,.15);
  color:var(--txm);font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.step.active .step-num{background:var(--teal);color:#fff}
.step-body{flex:1;min-width:0}
.step-label{font-size:13px;font-weight:600;color:var(--txm);transition:color .15s}
.step.active .step-label{color:var(--navy)}
.step-desc{font-size:12px;color:var(--txm);margin-top:3px;line-height:1.5;display:none}
.step.active .step-desc{display:block}
.step-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark);margin-top:5px;display:none}
.step.active .step-tag{display:inline-block}

/* ── CENTER: phone ── */
.phone-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;min-width:0;
}
.phone{
  width:300px;
  background:#0f1923;
  border-radius:44px;
  padding:10px;
  box-shadow:
    0 0 0 1px #2a3a4a,
    0 30px 80px rgba(0,0,0,.4),
    0 8px 24px rgba(0,0,0,.25);
  position:relative;flex-shrink:0;
}
.phone-screen{
  background:#fff;
  border-radius:36px;
  overflow:hidden;
  height:560px;
  position:relative;
}
/* notch */
.phone::before{
  content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:100px;height:28px;background:#0f1923;border-radius:0 0 20px 20px;
  z-index:10;
}
.phone-inner{
  position:absolute;inset:0;overflow-y:auto;
  padding-top:36px;
  scrollbar-width:none;
}
.phone-inner::-webkit-scrollbar{display:none}

/* status bar */
.statusbar{
  position:sticky;top:0;z-index:5;
  background:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px 4px;
  font-size:10px;font-weight:600;color:var(--tx);
  border-bottom:1px solid #f0f0f0;
}
.sb-time{font-family:var(--mono)}
.sb-icons{display:flex;align-items:center;gap:4px;font-size:11px}

/* app topbar */
.app-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 6px;
}
.app-brand{display:flex;align-items:center;gap:7px}
.app-logo{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.app-name{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.app-name span{color:var(--teal)}
.app-loc{font-size:9px;color:var(--txm);margin-top:1px;display:flex;align-items:center;gap:3px}
.app-pill{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark);border:1px solid var(--teal-border);display:flex;align-items:center;gap:4px}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* app nav */
.app-nav{display:flex;gap:2px;padding:4px 10px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid #f0f0f0}
.app-nav::-webkit-scrollbar{display:none}
.anb{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;font-size:10px;font-weight:500;color:var(--txs);background:none;border:none;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .15s}
.anb i{font-size:12px}
.anb.active{background:var(--teal);color:#fff}

/* content panels */
.panel{display:none;padding:12px 14px;animation:fadeIn .2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* metrics grid */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.mc{background:var(--surf2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 12px}
.ml{font-size:8px;color:var(--txm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.mv{font-size:18px;font-weight:700;color:var(--tx);line-height:1}
.mu{font-size:10px;font-weight:400;color:var(--txm)}
.mtr{font-size:9px;margin-top:3px;display:flex;align-items:center;gap:2px}
.up{color:var(--red)}.dn{color:var(--teal-dark)}.neu{color:var(--txm)}

/* alert */
.alert{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:10px;margin-bottom:9px;border:1px solid}
.aw{background:var(--amber-bg);border-color:var(--amber-bdr);color:var(--amber-tx)}
.aok{background:var(--teal-light);border-color:var(--teal-border);color:var(--teal-dark)}
.ar{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red-tx)}
.alert i{font-size:14px;flex-shrink:0;margin-top:1px}
.at2{font-size:11px;font-weight:600;line-height:1.4}
.ad{font-size:9.5px;opacity:.9;margin-top:2px;line-height:1.5}

/* card */
.card{background:var(--surf);border:1px solid var(--bdr2);border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chd{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--tx);margin-bottom:10px}
.chd i{font-size:13px;color:var(--teal)}

/* timeline rows */
.tl{display:flex;flex-direction:column;gap:7px}
.tr2{display:flex;align-items:flex-start;gap:7px;font-size:10px}
.td2{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.dg{background:var(--teal)}.da{background:var(--amber)}.dr{background:var(--red)}
.tt{color:var(--txm);min-width:70px;font-family:var(--mono);font-size:9px}
.tm{color:var(--tx);line-height:1.4}

/* chart */
.chart-wrap{position:relative;width:100%;margin-bottom:4px}
.chart-svg{width:100%;display:block}
.xaxis{display:flex;justify-content:space-between;margin-top:2px}
.xaxis span{font-size:8px;color:var(--txm);font-family:var(--mono)}

/* valve */
.gv-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid}
.gvo{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark)}
.gvc{background:var(--red-bg);border-color:var(--red);color:var(--red-tx)}
.vstatus{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.vs-o{background:var(--teal-light);color:var(--teal-dark)}
.vs-c{background:var(--red-bg);color:var(--red-tx)}

/* toggle */
.trow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr2);gap:10px}
.trow:last-child{border-bottom:none}
.tlabel{font-size:11px;font-weight:500;color:var(--tx)}
.tdesc{font-size:9px;color:var(--txm);margin-top:1px}
.tgl{position:relative;width:32px;height:18px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#c8dde9;border-radius:20px;cursor:pointer;transition:.2s}
.tsl::before{content:'';position:absolute;width:12px;height:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.tgl input:checked+.tsl{background:var(--teal)}
.tgl input:checked+.tsl::before{transform:translateX(14px)}

.info-box{font-size:10px;color:var(--txs);line-height:1.6;background:var(--surf2);border-radius:8px;padding:9px 11px;border:1px solid var(--bdr2)}
.devrow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:10px}
.devrow:last-child{border-bottom:none}
.dk{color:var(--txm)}.dv{font-weight:500;font-family:var(--mono);font-size:9px;color:var(--tx)}

.failsafe{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;background:var(--teal-light);border-radius:9px;border-left:2px solid var(--teal);margin-top:6px}
.failsafe i{font-size:12px;color:var(--teal);flex-shrink:0;margin-top:1px}
.failsafe p{font-size:9.5px;color:var(--teal-dark);line-height:1.5}

/* ugrid */
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ucard{border:1px solid var(--bdr2);border-radius:10px;padding:10px;background:var(--surf2)}
.uname{font-size:10px;font-weight:600;color:var(--tx)}
.utenant{font-size:9px;color:var(--txm);margin-top:1px}

/* ── RIGHT: USP callouts ── */
.usp-panel{
  width:220px;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:center;gap:10px;
}
.usp-card{
  background:#fff;
  border-radius:12px;
  padding:12px 14px;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
  display:flex;align-items:flex-start;gap:10px;
  opacity:.35;
  transition:opacity .3s,transform .3s,box-shadow .3s;
  transform:translateX(6px);
}
.usp-card.active{opacity:1;transform:translateX(0);box-shadow:0 4px 20px rgba(38,225,200,.15)}
.usp-icon{width:32px;height:32px;border-radius:8px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:15px;flex-shrink:0}
.usp-icon.navy{background:#e8eef2;color:var(--navy)}
.usp-title{font-size:12px;font-weight:600;color:var(--navy);line-height:1.3}
.usp-body{font-size:11px;color:var(--txm);margin-top:3px;line-height:1.5}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:0 48px 20px;flex-shrink:0;
}
.ctrl-btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 22px;border-radius:10px;
  font-size:13px;font-weight:600;
  cursor:pointer;border:none;font-family:var(--font);
  transition:all .15s;
}
.ctrl-prev{background:#fff;color:var(--navy);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.ctrl-prev:hover{background:#f5f9fc}
.ctrl-next{background:var(--navy);color:#fff;box-shadow:0 2px 12px rgba(27,58,75,.25)}
.ctrl-next:hover{background:#243f52}
.ctrl-dots{display:flex;gap:7px;align-items:center}
.ctrl-dot{width:7px;height:7px;border-radius:50%;background:rgba(27,58,75,.18);cursor:pointer;transition:all .15s}
.ctrl-dot.active{background:var(--navy);width:20px;border-radius:4px}

/* ── MOBILE ── */
@media (max-width: 768px) {
  body {
    overflow: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .header {
    padding: 12px 16px 10px;
  }
  .header-title { font-size: 18px; }
  .header-sub { font-size: 11px; }
  .brand-name { font-size: 17px; }
  .brand-logo { width: 30px; height: 30px; font-size: 16px; }

  .layout {
    flex-direction: column;
    padding: 12px 16px 8px;
    gap: 12px;
    align-items: center;
    flex: 1;
  }

  /* Hide side panels on mobile */
  .tour-panel { display: none; }
  .usp-panel { display: none; }

  /* Phone fills available width */
  .phone-wrap {
    width: 100%;
    justify-content: center;
  }
  .phone {
    width: min(320px, 90vw);
  }
  .phone-screen {
    height: min(560px, 65vh);
  }

  /* Step indicator bar replaces tour panel */
  .mobile-steps {
    display: flex !important;
    gap: 6px;
    width: 100%;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .mobile-steps::-webkit-scrollbar { display: none; }
  .mobile-step-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    background: rgba(27,58,75,.1);
    color: var(--txs);
    transition: all .15s;
    white-space: nowrap;
  }
  .mobile-step-btn.active {
    background: var(--navy);
    color: #fff;
  }

  .controls {
    padding: 10px 16px 16px;
    gap: 12px;
  }
  .ctrl-btn {
    padding: 9px 16px;
    font-size: 12px;
  }
}

/* Mobile step bar hidden on desktop */
.mobile-steps { display: none; }

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand-logo"><i class="ti ti-droplet"></i></div>
    <div>
      <div class="brand-name">Leak<span>Mate</span></div>
    </div>
  </div>
  <div>
    <div class="header-title">Application</div>
    <div class="header-sub">MVP-Tour durch die Hausverwaltungs-App</div>
  </div>
</div>

<!-- MOBILE STEP BAR -->
<div class="mobile-steps" id="mobileSteps"></div>

<!-- MAIN -->
<div class="layout">

  <!-- LEFT: steps -->
  <div class="tour-panel" id="tourPanel"></div>

  <!-- CENTER: phone -->
  <div class="phone-wrap">
    <div class="phone">
      <div class="phone-screen">
        <div class="phone-inner" id="phoneInner">

          <!-- STATUS BAR -->
          <div class="statusbar">
            <span class="sb-time">09:41</span>
            <span class="sb-icons"><i class="ti ti-wifi"></i><i class="ti ti-battery-2"></i></span>
          </div>

          <!-- APP TOPBAR -->
          <div class="app-topbar">
            <div class="app-brand">
              <div class="app-logo"><i class="ti ti-droplet"></i></div>
              <div>
                <div class="app-name">Leak<span>Mate</span></div>
                <div class="app-loc"><i class="ti ti-building" style="font-size:9px"></i>Musterstraße 12 · HV</div>
              </div>
            </div>
            <div class="app-pill"><div class="pulse"></div>Online</div>
          </div>

          <!-- APP NAV -->
          <div class="app-nav" id="appNav">
            <button class="anb active" data-panel="overview"><i class="ti ti-layout-dashboard"></i>Übersicht</button>
            <button class="anb" data-panel="leaks"><i class="ti ti-ripple"></i>Lecks</button>
            <button class="anb" data-panel="consumption"><i class="ti ti-chart-line"></i>Verbrauch</button>
            <button class="anb" data-panel="valve"><i class="ti ti-valve"></i>Ventile</button>
            <button class="anb" data-panel="settings"><i class="ti ti-settings"></i>Einstellungen</button>
          </div>

          <!-- OVERVIEW -->
          <div class="panel active" id="p-overview">
            <div class="alert aw">
              <i class="ti ti-alert-triangle"></i>
              <div>
                <div class="at2">Ungewöhnlicher Verbrauch – EG Müller</div>
                <div class="ad">02:14–03:02 Uhr · 8,3 Liter ohne Aktivität</div>
              </div>
            </div>
            <div class="mg">
              <div class="mc"><div class="ml">Gesamt heute</div><div class="mv">312 <span class="mu">L</span></div><div class="mtr up"><i class="ti ti-trending-up"></i>+8%</div></div>
              <div class="mc"><div class="ml">Einheiten</div><div class="mv">4 <span class="mu">WE</span></div><div class="mtr dn"><i class="ti ti-circle-check"></i>alle online</div></div>
              <div class="mc"><div class="ml">Hauptdruck</div><div class="mv">3.4 <span class="mu">bar</span></div><div class="mtr neu">Normal</div></div>
              <div class="mc"><div class="ml">Alarme</div><div class="mv" style="color:var(--amber)">1 <span class="mu">aktiv</span></div><div class="mtr up">Seit 02:14</div></div>
            </div>
            <div class="card">
              <div class="chd"><i class="ti ti-chart-line"></i>Verbrauch – letzte 24 Stunden</div>
              <div class="chart-wrap">
                <svg id="ov-svg" class="chart-svg" viewBox="0 0 400 80" height="80"></svg>
              </div>
              <div class="xaxis" id="ov-x"></div>
            </div>
            <div class="card">
              <div class="chd"><i class="ti ti-building"></i>Einheiten-Status</div>
              <div class="tl">
                <div class="tr2"><div class="td2 da"></div><span class="tt">EG · Müller</span><span class="tm">Anomalie 02:14 · 8.3 L ungeklärt</span></div>
                <div class="tr2"><div class="td2 dg"></div><span class="tt">1. OG · Weber</span><span class="tm">Alles normal · 91 L</span></div>
                <div class="tr2"><div class="td2 dg"></div><span class="tt">2. OG · Schmidt</span><span class="tm">Alles normal · 68 L</span></div>
                <div class="tr2"><div class="td2 dg"></div><span class="tt">DG · Leerstand</span><span class="tm">Überwacht · 0 L · Ventil gesperrt</span></div>
              </div>
            </div>
          </div>

          <!-- LEAKS -->
          <div class="panel" id="p-leaks">
            <div class="alert aw">
              <i class="ti ti-alert-triangle"></i>
              <div>
                <div class="at2">Verdächtiges Ereignis – EG Müller</div>
                <div class="ad">8,3 L zwischen 02:14–03:02 ohne Nutzung · möglicher Tropfverlust</div>
              </div>
            </div>
            <div class="card">
              <div class="chd"><i class="ti ti-topology-star"></i>Mesh-Netzwerk</div>
              <svg id="mesh-mini" viewBox="0 0 340 170" width="100%" style="display:block"></svg>
            </div>
            <div class="card">
              <div class="chd"><i class="ti ti-timeline"></i>Ereignis-Protokoll</div>
              <div class="tl">
                <div class="tr2"><div class="td2 da"></div><span class="tt">Heute</span><span class="tm">Schleichverlust 8.3 L EG – unter Beobachtung</span></div>
                <div class="tr2"><div class="td2 da"></div><span class="tt">Fr.</span><span class="tm">Druckabfall –0.3 bar (10 Min.)</span></div>
                <div class="tr2"><div class="td2 dr"></div><span class="tt">vor 3 Wo.</span><span class="tm">Leckage EG · Ventil geschlossen · Handwerker</span></div>
              </div>
            </div>
            <div class="card">
              <div class="chd"><i class="ti ti-tool"></i>Handwerkerbenachrichtigung</div>
              <div class="info-box">Im Schadensfall: automatisch SMS + E-Mail an <strong>Sanitär Müller GmbH</strong> mit Druckverlauf und Leckagezone.</div>
            </div>
          </div>

          <!-- CONSUMPTION -->
          <div class="panel" id="p-consumption">

<script>
/* ── Tour data ── */
const steps = [
  {

    tag: 'Dashboard',
    panel: 'overview',
    navIndex: 0,
    usps: [
      {icon:'ti-chart-bar', navy:false, title:'Echtzeit-Verbrauch', body:'Liter-genaue Übersicht aller Einheiten, immer aktuell.'},
      {icon:'ti-alert-triangle', navy:false, title:'Push-Alarm', body:'Sofortige Benachrichtigung bei ungewöhnlichem Verbrauch.'},
      {icon:'ti-building', navy:true, title:'Multi-Zonen', body:'Alle Wohneinheiten auf einen Blick – inkl. Leerstand.'},
    ]
  },
  {
    label: 'Leckage & Alarm',
    desc: 'Sekunden-genaue Leckage-Erkennung per Mesh-Netzwerk mit automatischer Handwerker-Meldung.',
    tag: 'Leckage-Erkennung',
    panel: 'leaks',
    navIndex: 1,
    usps: [
      {icon:'ti-topology-star', navy:false, title:'Mesh-Netzwerk', body:'Eingrenzung auf Wohnungsebene durch verteilte Sensoren.'},
      {icon:'ti-tool', navy:true, title:'Handwerker-Meldung', body:'Automatische Benachrichtigung im Schadensfall.'},
      {icon:'ti-timeline', navy:false, title:'Ereignis-Log', body:'Vollständige Protokollierung aller Druck- und Verbrauchsanomalien.'},
    ]
  },
  {
    label: 'Verbrauch',
    desc: 'Historische Verbrauchsdaten pro Einheit mit automatischer Kostenschätzung für die Nebenkostenabrechnung.',
    tag: 'Kostentransparenz',
    panel: 'consumption',
    navIndex: 2,
    usps: [
      {icon:'ti-coin', navy:false, title:'Kostenprognose', body:'Automatische Hochrechnung der Wasserkosten pro WE.'},
      {icon:'ti-file-invoice', navy:true, title:'PDF-Export', body:'Nebenkostenabrechnung direkt aus der App generieren.'},
      {icon:'ti-chart-line', navy:false, title:'Statistiken', body:'Tages-, Wochen- und Monatsverlauf je Einheit.'},
    ]
  },
  {
    label: 'Ventile',
    desc: 'Fernsteuerung aller Ventile – einzeln oder global. Automatik-Regeln für Leerstand und Frostschutz.',
    tag: 'Fernsteuerung',
    panel: 'valve',
    navIndex: 3,
    usps: [
      {icon:'ti-valve', navy:false, title:'Ventil-Notabschaltung', body:'Einzelne Einheiten oder gesamtes Gebäude per Klick sperren.'},
      {icon:'ti-shield-check', navy:true, title:'Fail-Safe', body:'Lokale Abschaltung ohne Cloud – auch bei Stromausfall.'},
      {icon:'ti-robot', navy:false, title:'Automatik-Regeln', body:'Leerstand, Frostschutz und Leckage automatisch gesteuert.'},
    ]
  },
  {
    label: 'Einstellungen',
    desc: 'Lokale Datenhaltung auf dem Raspberry Pi. Integrationen für Smart-Home und Versicherungs-API.',
    tag: 'Datenschutz & Integration',
    panel: 'settings',
    navIndex: 4,
    usps: [
      {icon:'ti-home-bolt', navy:false, title:'Smart-Home', body:'Home Assistant & ioBroker direkt integriert.'},
      {icon:'ti-server', navy:true, title:'Lokale Daten', body:'Kein Cloud-Zwang – alle Daten auf dem eigenen Gerät.'},
      {icon:'ti-shield', navy:false, title:'Versicherungs-API', body:'Direktschnittstelle für Versicherungspartner geplant.'},
    ]
  },
];

let current = 0;

/* ── Build tour steps ── */
const tourPanel = document.getElementById('tourPanel');
const mobileSteps = document.getElementById('mobileSteps');
steps.forEach((s,i) => {
  const div = document.createElement('div');
  div.className = 'step' + (i===0?' active':'');
  div.onclick = () => goTo(i);
  div.innerHTML = `
    <div class="step-num">${i+1}</div>
    <div class="step-body">
      <div class="step-label">${s.label}</div>
      <div class="step-desc">${s.desc}</div>
      <div class="step-tag">${s.tag}</div>
    </div>`;
  tourPanel.appendChild(div);

  // mobile pill buttons
  const btn = document.createElement('button');
  btn.className = 'mobile-step-btn' + (i===0?' active':'');
  btn.textContent = `${i+1}. ${s.label}`;
  btn.onclick = () => goTo(i);
  btn.id = `mob-step-${i}`;
  mobileSteps.appendChild(btn);
});

/* ── Build USP cards ── */
const uspPanel = document.getElementById('uspPanel');
steps[0].usps.forEach((u,i) => {
  const div = document.createElement('div');
  div.className = 'usp-card' + (i===0?' active':'');
  div.id = `usp-initial-${i}`;
  div.innerHTML = `
    <div class="usp-icon${u.navy?' navy':''}"><i class="ti ${u.icon}"></i></div>
    <div><div class="usp-title">${u.title}</div><div class="usp-body">${u.body}</div></div>`;
  uspPanel.appendChild(div);
});

/* ── Build dots ── */
const dotsEl = document.getElementById('ctrlDots');
steps.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'ctrl-dot' + (i===0?' active':'');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

/* ── Charts ── */
function lineChart(svgId, datasets, H, yMax) {
  const svg = document.getElementById(svgId);
  if(!svg) return;
  const W=400, pad={t:8,r:8,b:4,l:28};
  const w=W-pad.l-pad.r, h=H-pad.t-pad.b, n=24;
  const max=yMax||Math.ceil(Math.max(...datasets.flatMap(d=>d.data))*1.2)||10;
  const NS='http://www.w3.org/2000/svg';
  const mk=(tag,a)=>{const el=document.createElementNS(NS,tag);Object.entries(a||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  for(let i=0;i<=3;i++){
    const y=pad.t+h-(i/3)*h;
    svg.appendChild(mk('line',{x1:pad.l,x2:pad.l+w,y1:y,y2:y,stroke:'#c8dde9','stroke-width':'1'}));
  }
  datasets.forEach(ds=>{
    const pt=i=>({x:pad.l+(i/(n-1))*w, y:pad.t+h-(ds.data[i]/max)*h});
    if(ds.fill){
      let p=`${pad.l},${pad.t+h}`;
      for(let i=0;i<n;i++){const q=pt(i);p+=` ${q.x},${q.y}`;}
      p+=` ${pad.l+w},${pad.t+h}`;
      svg.appendChild(mk('polygon',{points:p,fill:ds.color,opacity:'0.15'}));
    }
    let d='';
    for(let i=0;i<n;i++){const q=pt(i);d+=(i===0?'M':'L')+q.x+','+q.y+' ';}
    svg.appendChild(mk('path',{d,fill:'none',stroke:ds.color,'stroke-width':ds.w||1.5,'stroke-linejoin':'round','stroke-linecap':'round'}));
    (ds.anomaly||[]).forEach(idx=>{
      const q=pt(idx);
      svg.appendChild(mk('circle',{cx:q.x,cy:q.y,r:'4',fill:'#EF9F27',stroke:'#fff','stroke-width':'1.5'}));
    });
  });
}

function rnd(base,noise,spike,anom){
  return Array.from({length:24},(_,i)=>{
    let v=base+(Math.random()-.5)*noise;
    if(i>=7&&i<=9)v+=spike;
    if(anom&&(i===2||i===3))v+=spike*.3;
    return Math.max(0,Math.round(v));
  });
}
const C={tot:'#26e1c8',eg:'#2B8FBF',og:'#EF9F27',og2:'#9B59B6'};
const totD=rnd(12,4,18,true),egD=rnd(4,2,6,true),ogD=rnd(4,2,7),og2D=rnd(3,2,5);

lineChart('ov-svg',[{data:totD,color:C.tot,w:2,fill:C.tot,anomaly:[2,3]}],80);
lineChart('cons-svg',[
  {data:totD,color:C.tot,w:2,fill:C.tot},
  {data:egD,color:C.eg,w:1.5},
  {data:ogD,color:C.og,w:1.5},
  {data:og2D,color:C.og2,w:1.5},
],90);

// mini x-axis
['0h','6h','12h','18h','23h'].forEach(l=>{
  ['ov-x','cons-x'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const s=document.createElement('span');s.textContent=l;el.appendChild(s);}
  });
});

/* ── Mini mesh ── */
(function(){
  const svg = document.getElementById('mesh-mini');
  if(!svg)return;
  const NS='http://www.w3.org/2000/svg';
  const mk=(tag,a)=>{const el=document.createElementNS(NS,tag);Object.entries(a||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  const text=(x,y,t,sz,fill,anchor,w)=>{const el=mk('text',{x,y,'font-size':sz||9,fill:fill||'#3a5568','text-anchor':anchor||'middle','font-family':'DM Sans,sans-serif'});if(w)el.setAttribute('font-weight',w);el.textContent=t;return el;};
  const nodes=[
    {label:'EG · Müller',col:'#faeeda',border:'#EF9F27',flow:'78 L',tx:'#854F0B'},
    {label:'1. OG · Weber',col:'#e8fdfb',border:'#26e1c8',flow:'91 L',tx:'#12b09c'},
    {label:'2. OG · Schmidt',col:'#e8fdfb',border:'#26e1c8',flow:'68 L',tx:'#12b09c'},
    {label:'DG · Leerstand',col:'#eef4f9',border:'#9bb3c5',flow:'0 L',tx:'#6b8fa8'},
  ];
  // root
  svg.appendChild(mk('rect',{x:120,y:6,width:100,height:38,rx:8,fill:'#e8fdfb',stroke:'#26e1c8','stroke-width':'1.5'}));
  svg.appendChild(text(170,22,'Hauptzähler',9,'#12b09c','middle','700'));
  svg.appendChild(text(170,36,'3.4 bar · Keller',8,'#6b8fa8','middle'));
  // stem
  svg.appendChild(mk('line',{x1:170,y1:44,x2:170,y2:62,stroke:'#a0ede5','stroke-width':'1.5','stroke-dasharray':'3,2'}));
  // h-bar
  svg.appendChild(mk('line',{x1:30,y1:62,x2:310,y2:62,stroke:'#a0ede5','stroke-width':'1.5','stroke-dasharray':'3,2'}));
  const cxs=[30,110,210,310];
  nodes.forEach((n,i)=>{
    const cx=cxs[i];
    svg.appendChild(mk('line',{x1:cx,y1:62,x2:cx,y2:78,stroke:'#a0ede5','stroke-width':'1.5','stroke-dasharray':'3,2'}));
    svg.appendChild(mk('rect',{x:cx-34,y:78,width:68,height:52,rx:7,fill:n.col,stroke:n.border,'stroke-width':'1.5'}));
    const parts=n.label.split(' · ');
    svg.appendChild(text(cx,92,parts[0],7.5,n.tx,'middle','700'));
    svg.appendChild(text(cx,103,parts[1],7,'#6b8fa8','middle'));
    svg.appendChild(mk('rect',{x:cx-18,y:108,width:36,height:14,rx:7,fill:n.col}));
    svg.appendChild(text(cx,119,n.flow,7.5,n.tx,'middle','700'));
  });
  svg.appendChild(mk('circle',{cx:30,cy:62,r:'4',fill:'#EF9F27'}));
  [110,210,310].forEach(x=>svg.appendChild(mk('circle',{cx:x,cy:62,r:'4',fill:'#26e1c8'})));
})();

/* ── Navigation ── */
function goTo(idx){
  const s=steps[idx];
  // steps
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===idx));
  // mobile step buttons
  document.querySelectorAll('.mobile-step-btn').forEach((el,i)=>el.classList.toggle('active',i===idx));
  // scroll active mobile step into view
  const activeBtn = document.getElementById(`mob-step-${idx}`);
  if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  // dots
  document.querySelectorAll('.ctrl-dot').forEach((el,i)=>el.classList.toggle('active',i===idx));
  // panel
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+s.panel).classList.add('active');
  // nav highlight
  document.querySelectorAll('.anb').forEach((b,i)=>b.classList.toggle('active',i===s.navIndex));
  // scroll phone to top
  document.getElementById('phoneInner').scrollTop=0;
  // USPs
  uspPanel.innerHTML='';
  s.usps.forEach((u,i)=>{
    const div=document.createElement('div');
    div.className='usp-card';
    div.innerHTML=`<div class="usp-icon${u.navy?' navy':''}"><i class="ti ${u.icon}"></i></div><div><div class="usp-title">${u.title}</div><div class="usp-body">${u.body}</div></div>`;
    uspPanel.appendChild(div);
    setTimeout(()=>div.classList.add('active'),i*80);
  });
  // btn states
  document.getElementById('btnPrev').style.opacity = idx===0?'0.35':'1';
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').textContent = idx===steps.length-1?'Fertig ✓':'Weiter ';
  document.getElementById('btnNext').innerHTML = idx===steps.length-1
    ? 'Fertig <i class="ti ti-check"></i>'
    : 'Weiter <i class="ti ti-chevron-right"></i>';
  current=idx;
}

function navigate(dir){
  const next=(current+dir+steps.length)%steps.length;
  goTo(next);
}

// init
goTo(0);
</script>
